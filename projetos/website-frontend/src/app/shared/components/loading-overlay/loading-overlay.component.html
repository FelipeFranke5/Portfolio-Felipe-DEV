@if (loadingService.isLoading()) {
  <div class="loading-overlay" role="status" aria-live="polite" aria-label="Carregando conteúdo">
    <div class="loading-overlay__ring-outer">
      <div class="loading-overlay__glow" aria-hidden="true"></div>
      <div class="loading-overlay__ring" aria-hidden="true"></div>
    </div>
  </div>
}
